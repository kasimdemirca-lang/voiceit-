<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f2952">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ComplaintCA — Canada's Official Complaint Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f8faff;color:#0f172a;-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{--navy:#0f2952;--blue:#1a4fa0;--mid:#2563c0;--light:#3b82f6;--ice:#e8f0fe;--acc2:#f0f7ff;--white:#fff;--off:#f4f7ff;--text:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#dbeafe;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--radius:14px;--shsm:0 2px 8px rgba(26,79,160,.07)}
#pg-land{display:block}#pg-app{display:none}
/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(15,41,82,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07)}
.topbar-inner{max-width:1080px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Sora',sans-serif;font-weight:700;font-size:1.1rem;color:white;display:flex;align-items:center;gap:10px;cursor:pointer;background:none;border:none}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#1a4fa0,#0f2952);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.topbar-right{display:flex;align-items:center;gap:10px}
.back-btn{display:none;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:600;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif}
.back-btn:hover{color:white}.back-btn.show{display:flex}
.lp{font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.6);background:transparent;cursor:pointer;transition:all .18s}
.lp:hover,.lp.on{background:white;color:var(--navy);border-color:white}
/* LANDING */
.hero{min-height:100svh;background:linear-gradient(160deg,var(--navy) 0%,#163a7a 55%,#1a4fa0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.hero-orb{position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.18) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:6px 16px;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.8px;text-transform:uppercase;margin-bottom:28px;position:relative}
.edot{width:6px;height:6px;border-radius:50%;background:#60a5fa;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-title{font-family:'Sora',sans-serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:800;color:white;line-height:1.12;letter-spacing:-1px;max-width:680px;margin-bottom:20px;position:relative}
.hero-title em{font-style:normal;color:#93c5fd}
.hero-sub{font-size:clamp(.88rem,2vw,1rem);color:rgba(255,255,255,.6);max-width:480px;line-height:1.7;margin-bottom:44px;position:relative}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;position:relative}
.btn-w{background:white;color:var(--navy);font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;padding:14px 32px;border-radius:10px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.btn-w:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.btn-o{background:rgba(255,255,255,.1);color:white;font-family:'Sora',sans-serif;font-weight:600;font-size:.92rem;padding:14px 28px;border-radius:10px;border:1px solid rgba(255,255,255,.2);cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.btn-o:hover{background:rgba(255,255,255,.15)}
.scroll-cue{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:1px;text-transform:uppercase}
.sa{width:20px;height:30px;border:1.5px solid rgba(255,255,255,.2);border-radius:10px;position:relative}
.sa::after{content:'';position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.4);top:5px;left:50%;transform:translateX(-50%);animation:sd 1.6s ease-in-out infinite}
@keyframes sd{0%{top:5px;opacity:1}80%{top:16px;opacity:0}100%{top:5px;opacity:0}}
.trust-bar{background:var(--off);border-bottom:1px solid var(--border);padding:18px 24px}
.trust-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--sub);font-weight:500}
.ls{padding:80px 24px;max-width:860px;margin:0 auto}
.s-eye{font-size:.7rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--light);margin-bottom:12px}
.s-title{font-family:'Sora',sans-serif;font-size:clamp(1.5rem,4vw,2.1rem);font-weight:700;color:var(--navy);letter-spacing:-.5px;line-height:1.2;margin-bottom:12px}
.s-sub{font-size:.92rem;color:var(--sub);line-height:1.7;max-width:520px;margin-bottom:52px}
.steps{display:flex;flex-direction:column;position:relative}
.steps::before{content:'';position:absolute;left:27px;top:54px;bottom:54px;width:2px;background:var(--border)}
.step{display:flex;gap:24px;align-items:flex-start;padding:28px 0;position:relative;opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.step.vis{opacity:1;transform:translateY(0)}
.sn{width:56px;height:56px;border-radius:16px;background:var(--navy);color:white;font-family:'Sora',sans-serif;font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 16px rgba(15,41,82,.2)}
.step:nth-child(2) .sn{background:var(--blue)}.step:nth-child(3) .sn{background:var(--mid)}.step:nth-child(4) .sn{background:var(--light)}
.sb{flex:1;padding-top:10px}
.sl{font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.st{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:-.3px}
.sd-t{font-size:.85rem;color:var(--sub);line-height:1.65}
.sc{display:inline-block;margin-top:10px;background:var(--ice);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:.72rem;font-weight:600;color:var(--blue)}
.ldiv{height:1px;background:var(--border);max-width:860px;margin:0 auto}
.bcta{background:linear-gradient(135deg,var(--navy),var(--blue));padding:72px 24px;text-align:center;position:relative;overflow:hidden}
.bcta::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px}
.bcta-t{font-family:'Sora',sans-serif;font-size:clamp(1.5rem,4vw,2rem);font-weight:700;color:white;letter-spacing:-.5px;margin-bottom:12px;position:relative}
.bcta-s{font-size:.92rem;color:rgba(255,255,255,.6);margin-bottom:32px;position:relative}
.bcta .btn-w{position:relative}
footer{background:var(--navy);border-top:1px solid rgba(255,255,255,.06);padding:24px}
.fi{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.flogo{font-family:'Sora',sans-serif;font-weight:700;color:rgba(255,255,255,.5);font-size:.88rem}
.fnote{font-size:.72rem;color:rgba(255,255,255,.25)}
/* APP */
.nav-tabs{background:white;border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90}
.nav-inner{max-width:680px;margin:0 auto;display:flex}
.nav-tab{flex:1;padding:14px 8px;text-align:center;font-size:.78rem;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.amain{max-width:680px;margin:0 auto;padding:24px 16px 100px}
.card{background:white;border-radius:var(--radius);box-shadow:var(--shsm);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.ct{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ci{width:28px;height:28px;background:var(--ice);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
label{display:block;font-size:.78rem;font-weight:600;color:var(--sub);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:.88rem;font-family:'Inter',sans-serif;color:var(--text);background:white;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--light);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
textarea{resize:vertical;min-height:90px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sopt{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--sub);transition:all .2s;background:white}
.sopt:hover{border-color:var(--light);color:var(--blue)}
.sopt.sel{border-color:var(--blue);background:var(--ice);color:var(--blue);font-weight:600}
.trow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--acc2)}
.trow:last-child{border-bottom:none}
.tlbl{font-size:.85rem;color:var(--text);font-weight:500}
.tsub{font-size:.75rem;color:var(--muted)}
.tog{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--blue)}
.tog::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(20px)}
.pup{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;color:var(--sub);font-size:.83rem}
.pup:hover{border-color:var(--light);background:var(--acc2)}
.pup .ui{font-size:1.8rem;margin-bottom:6px}
.pgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.pthumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border)}
.ptwrap{position:relative;width:72px;height:72px}
.prm{position:absolute;top:-6px;right:-6px;background:var(--red);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#photo-input{display:none}
.lbar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.lbar input{margin-bottom:0;flex:1}
.lbtn{background:var(--ice);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:1rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.lbtn:hover{background:var(--blue);color:white;border-color:var(--blue)}
.ai-box{background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border:1.5px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:14px}
.ai-title{font-size:.78rem;font-weight:700;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
.ai-content{font-size:.85rem;color:var(--text);line-height:1.6}
.ai-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ai-tag{background:var(--blue);color:white;border-radius:20px;padding:3px 12px;font-size:.72rem;font-weight:600}
.ai-tag.w{background:var(--yellow)}.ai-tag.ok{background:var(--green)}
.prow{display:flex;gap:8px;margin-bottom:14px}
.pbtn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;background:white;transition:all .2s}
.pbtn.low.on{background:#dcfce7;border-color:var(--green);color:var(--green)}
.pbtn.med.on{background:#fef9c3;border-color:var(--yellow);color:var(--yellow)}
.pbtn.high.on{background:#fee2e2;border-color:var(--red);color:var(--red)}
.sbtn{width:100%;background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%);color:white;border:none;border-radius:var(--radius);padding:16px;font-size:.95rem;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(26,79,160,.25)}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,79,160,.35)}
.sbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.tsearch{display:flex;gap:8px;margin-bottom:16px}
.tsearch input{flex:1;margin-bottom:0}
.tsearch button{background:var(--blue);color:white;border:none;border-radius:10px;padding:11px 16px;font-weight:600;font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif}
.scard{border-radius:var(--radius);border:1.5px solid var(--border);padding:18px;margin-bottom:12px;background:white}
.shdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sid{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px}
.sbadge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px}
.sbadge.received{background:#dbeafe;color:#1d4ed8}.sbadge.review{background:#fef9c3;color:#92400e}
.sbadge.resolved{background:#dcfce7;color:#166534}.sbadge.rejected{background:#fee2e2;color:#991b1b}
.stitle{font-weight:600;font-size:.88rem;color:var(--text);margin-bottom:4px}
.smeta{font-size:.75rem;color:var(--muted)}
.tl{margin-top:14px;padding-left:4px}
.tli{display:flex;gap:12px;margin-bottom:12px;position:relative}
.tldot{width:10px;height:10px;border-radius:50%;background:var(--light);flex-shrink:0;margin-top:4px;position:relative;z-index:1}
.tldot.done{background:var(--green)}.tldot.cur{background:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
.tlline{position:absolute;left:4px;top:14px;width:2px;height:calc(100% + 2px);background:var(--border)}
.tlt{font-size:.8rem}.tll{font-weight:600;color:var(--text)}.tld{color:var(--muted);font-size:.72rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-i{font-size:2.5rem;margin-bottom:12px}
.empty-t{font-size:.85rem;line-height:1.6}
.scs{display:none;text-align:center;padding:40px 20px}
.sci{font-size:3rem;margin-bottom:16px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.sct{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.scs-sub{font-size:.85rem;color:var(--sub);line-height:1.6;margin-bottom:20px}
.refno{background:var(--ice);border:1.5px solid var(--border);border-radius:10px;padding:14px 20px;display:inline-block;font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:20px}
.newbtn{background:var(--ice);color:var(--blue);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 24px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.cc{font-size:.72rem;color:var(--muted);text-align:right;margin-top:-10px;margin-bottom:14px}
.inote{font-size:.75rem;color:var(--sub);background:var(--acc2);border-radius:8px;padding:10px 12px;margin-bottom:14px;line-height:1.5;border-left:3px solid var(--light)}
@media(max-width:600px){.steps::before{left:23px}.sn{width:46px;height:46px;font-size:.95rem;border-radius:12px}.trust-inner{gap:16px}.hero-ctas{flex-direction:column;align-items:center}.btn-w,.btn-o{width:260px;justify-content:center}}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
#map-preview{height:180px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:14px;display:none;overflow:hidden}
.loc-wrap{position:relative}
.loc-dropdown{position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(15,41,82,.12);z-index:500;max-height:200px;overflow-y:auto;display:none}
.loc-item{padding:10px 14px;font-size:.82rem;color:var(--text);cursor:pointer;border-bottom:1px solid var(--acc2);line-height:1.4}
.loc-item:last-child{border-bottom:none}
.loc-item:hover{background:var(--ice);color:var(--blue)}
.loc-item strong{display:block;font-weight:600;font-size:.83rem}
.loc-item span{color:var(--muted);font-size:.75rem}
.map-confirm{background:var(--ice);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--sub);margin-bottom:14px;display:none;line-height:1.5}
.map-confirm strong{color:var(--navy);display:block;margin-bottom:4px}
.map-btns{display:flex;gap:8px;margin-top:8px}
.map-btn-ok{background:var(--blue);color:white;border:none;border-radius:8px;padding:7px 16px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.map-btn-no{background:white;color:var(--sub);border:1.5px solid var(--border);border-radius:8px;padding:7px 16px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button class="logo" onclick="goHome()"><div class="logo-mark">⚖️</div>ComplaintCA</button>
    <div class="topbar-right">
      <button class="back-btn" id="back-btn" onclick="goHome()">← Home</button>
      <div style="display:flex;gap:4px">
        <button class="lp on" onclick="V.lang('en',this)">EN</button>
        <button class="lp" onclick="V.lang('tr',this)">TR</button>
        <button class="lp" onclick="V.lang('fr',this)">FR</button>
      </div>
    </div>
  </div>
</header>

<!-- LANDING -->
<div id="pg-land">
<section class="hero">
  <div class="hero-orb"></div>
  <div class="hero-eyebrow">🇨🇦 <span class="edot"></span><span id="l-eyebrow"></span></div>
  <h1 class="hero-title" id="l-hero-title"></h1>
  <p class="hero-sub" id="l-hero-sub"></p>
  <div class="hero-ctas">
    <button class="btn-w" onclick="goApp('new')"><span>📝</span><span id="l-cta1"></span></button>
    <button class="btn-o" onclick="goApp('track')"><span>🔍</span><span id="l-cta2"></span></button>
  </div>
  <div class="scroll-cue"><div class="sa"></div><span id="l-scroll"></span></div>
</section>
<div class="trust-bar">
  <div class="trust-inner">
    <div class="trust-item"><span>🇨🇦</span><span>Canada</span></div><div class="trust-item"><span>🔒</span><span id="l-t1"></span></div>
    <div class="trust-item"><span>🤖</span><span id="l-t2"></span></div>
    <div class="trust-item"><span>🌐</span><span id="l-t3"></span></div>
    <div class="trust-item"><span>📋</span><span id="l-t4"></span></div>
  </div>
</div>
<div class="ls">
  <div class="s-eye" id="l-eye"></div>
  <h2 class="s-title" id="l-stitle"></h2>
  <p class="s-sub" id="l-ssub"></p>
  <div class="steps">

// ── APP STATE ──
let _isAnon=false, _selTgt='', _selPri='medium', _photos=[], _complaints=JSON.parse(localStorage.getItem('vc_comp')||'[]');

function showTab(tab){
  document.getElementById('view-new').style.display=tab==='new'?'':'none';
  document.getElementById('view-track').style.display=tab==='track'?'':'none';
  document.getElementById('tab-new').classList.toggle('active',tab==='new');
  document.getElementById('tab-track').classList.toggle('active',tab==='track');
  if(tab==='track') renderRecent();
}
function toggleAnon(){
  _isAnon=!_isAnon;
  document.getElementById('anon-tog').classList.toggle('on',_isAnon);
  document.getElementById('id-fields').style.display=_isAnon?'none':'';
}
function selTarget(el){
  document.querySelectorAll('#tgt-grid .sopt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel'); _selTgt=el.getAttribute('data-val');
}
function selPri(p,el){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); _selPri=p;
}
function updateCC(){
  document.getElementById('char-cnt').textContent=document.getElementById('inp-desc').value.length+' / 1000';
}
function getLoc(){
  const s=document.getElementById('loc-st'),btn=document.getElementById('loc-btn');
  s.style.display='block'; s.textContent=V.t('ld'); btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json')
      .then(r=>r.json()).then(d=>{
        const addr=d.display_name||lat.toFixed(4)+','+lng.toFixed(4);
        document.getElementById('inp-loc').value=addr;
        s.textContent=V.t('ld2')+' ✓'; btn.textContent='✅';
        _initMap(lat,lng);
        _showMapConfirm(addr);
      }).catch(()=>{
        document.getElementById('inp-loc').value=lat.toFixed(5)+','+lng.toFixed(5);
        s.textContent=V.t('ld2')+' ✓'; btn.textContent='✅';
        _initMap(lat,lng);
      });
  },()=>{ s.textContent='Location access denied.'; btn.textContent='📡'; });
}
function addPhotos(inp){
  Array.from(inp.files).forEach(f=>{
    if(_photos.length>=10) return;
    const r=new FileReader(); r.onload=e=>{_photos.push({name:f.name,data:e.target.result}); renderPhotos();}; r.readAsDataURL(f);
  }); inp.value='';
}
function removePhoto(i){ _photos.splice(i,1); renderPhotos(); }
function renderPhotos(){
  document.getElementById('pgrid').innerHTML=_photos.map((p,i)=>`<div class="ptwrap"><img class="pthumb" src="${p.data}"><button class="prm" onclick="removePhoto(${i})">✕</button></div>`).join('');
}

  var lp=document.querySelector('.lp.on');

  // Open Asya modal
  var modal=document.getElementById('a-modal');

  // Build the improvement request
  var improveMsg = _aLang==='tr'

    : _aLang==='fr'

    : 'Please rewrite my complaint in a professional, strong tone and suggest the right Canadian authority:\n\nTitle: '+(title||'(none)')+'\nCategory: '+(cat||'(none)')+'\nComplaint: '+desc;

  }
}

// ══════════════════════════════
const ASYA_T = {
  en:{greeting:"Hi! I'm Asya. Tell me what happened and I'll help you file a complaint.",tap:"Tap to speak",type_ph:"Or type your message...",thinking:"Thinking...",listening:"Listening...",nomic:"Microphone not supported. Please type below."},
  tr:{greeting:"Merhaba! Ben Asya. Ne olduğunu anlat, şikayetini birlikte hazırlayalım.",tap:"Konuşmak için dokun",type_ph:"Veya mesajınızı yazın...",thinking:"Düşünüyorum...",listening:"Dinliyorum...",nomic:"Mikrofon desteklenmiyor. Lütfen yazın."},
  fr:{greeting:"Bonjour! Je suis Asya. Dites-moi ce qui s'est passé et je vous aiderai.",tap:"Appuyez pour parler",type_ph:"Ou tapez votre message...",thinking:"Je réfléchis...",listening:"J'écoute...",nomic:"Microphone non supporté. Veuillez taper."}
};

let _aLang='tr', _aHistory=[], _aListening=false, _aSpeaking=false, _aRec=null;

function _aT(k){ return (ASYA_T[_aLang]||ASYA_T.en)[k]||k; }

function _aSpeak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _aSpeaking=true;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=_aLang==='tr'?'tr-TR':_aLang==='fr'?'fr-FR':'en-US';
  u.rate=1.0; u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices();
  const fv=vs.find(v=>v.lang.startsWith(u.lang.split('-')[0])&&/female|woman|samantha|alice|zira|amelie|karen/i.test(v.name));
  if(fv) u.voice=fv;
  u.onend=()=>{_aSpeaking=false;};
  u.onerror=()=>{_aSpeaking=false;};
  window.speechSynthesis.speak(u);
}

function _aAddMsg(role,text){
  const chat=document.getElementById('a-chat');
  if(!chat) return;
  const d=document.createElement('div');
  d.className='a-msg a-'+role;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function _aSetStatus(s){
  const st=document.getElementById('a-status');
  const mb=document.getElementById('a-mic-btn');
  if(st) st.textContent=s==='listening'?_aT('listening'):s==='thinking'?_aT('thinking'):'Asya';
  if(mb){
    mb.style.background=s==='listening'?'linear-gradient(135deg,#16a34a,#166534)':s==='thinking'?'linear-gradient(135deg,#d97706,#92400e)':'linear-gradient(135deg,#1a4fa0,#0f2952)';
  }
}

async function _aAskClaude(userMsg){
  _aHistory.push({role:'user',content:userMsg});
  _aSetStatus('thinking');
  const sys='You are Asya, a warm AI complaint assistant for ComplaintCA Canada. Language: '+(_aLang==='tr'?'Turkish':_aLang==='fr'?'French':'English')+'. Always respond in this language. Help users prepare strong complaints. If the user asks you to rewrite/improve/strengthen a complaint, respond with a brief friendly intro (1 sentence), then write the improved formal complaint starting with COMPLAINT: on its own line, and after it suggest the right Canadian authority (e.g. Landlord and Tenant Board for rent issues, CRTC for telecom, FCAC for banks, Peel Public Health for restaurants). For normal conversation, ask one question at a time and keep responses SHORT (2 sentences). When you have enough info, write the complaint starting with COMPLAINT: on its own line.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,system:sys,messages:_aHistory})
    });
    const d=await res.json();
    const reply=d.content.map(c=>c.text||'').join('');
    _aHistory.push({role:'assistant',content:reply});
    _aSetStatus('idle');
    return reply;
  }catch(e){
    _aSetStatus('idle');
    return _aLang==='tr'?'Bir hata oluştu, lütfen tekrar deneyin.':'Sorry, an error occurred. Please try again.';
  }
}

async function _aHandleInput(text){
  if(!text.trim()) return;
  _aAddMsg('user',text);
  const reply=await _aAskClaude(text);
  _aAddMsg('asya',reply);
  _aSpeak(reply);
  // If reply contains an improved complaint, offer to apply it
  if(reply.indexOf('COMPLAINT:')>-1){
    var complaint=reply.split('COMPLAINT:')[1].trim();
    _aShowApply(complaint);
  }
}

function _aShowApply(complaintText){
  var chat=document.getElementById('a-chat');
  if(!chat) return;
  var btn=document.createElement('button');
  btn.textContent=_aLang==='tr'?'✓ Bu metni forma uygula':_aLang==='fr'?'✓ Appliquer au formulaire':'✓ Apply to form';
  btn.style.cssText='margin:4px 0 8px;background:#16a34a;color:white;border:none;border-radius:10px;padding:10px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;align-self:flex-start';
  btn.onclick=function(){
    var d=document.getElementById('inp-desc');
    if(d){ d.value=complaintText; updateCC(); }
    btn.textContent=_aLang==='tr'?'✓ Uygulandı!':'✓ Applied!';
    btn.style.background='#94a3b8';
    btn.disabled=true;
  };
  chat.appendChild(btn);
  chat.scrollTop=chat.scrollHeight;
}

function _aListen(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert(_aT('nomic'));return;}
  if(_aListening){if(_aRec)_aRec.stop();_aListening=false;_aSetStatus('idle');return;}
  if(_aSpeaking){window.speechSynthesis.cancel();_aSpeaking=false;}
  _aRec=new SR();
  _aRec.lang=_aLang==='tr'?'tr-TR':_aLang==='fr'?'fr-FR':'en-US';
  _aRec.interimResults=false;
  _aRec.onstart=()=>{_aListening=true;_aSetStatus('listening');};
  _aRec.onresult=e=>{const t=e.results[0][0].transcript;_aListening=false;_aSetStatus('idle');_aHandleInput(t);};
  _aRec.onerror=()=>{_aListening=false;_aSetStatus('idle');};
  _aRec.onend=()=>{if(_aListening){_aListening=false;_aSetStatus('idle');}};
  _aRec.start();
}

function _aSendText(){
  const inp=document.getElementById('a-text');
  if(!inp||!inp.value.trim()) return;
  const t=inp.value.trim();
  inp.value='';
  _aHandleInput(t);
}

function _aToggle(){
  const m=document.getElementById('a-modal');
  if(!m) return;
  const open=m.style.display!=='none';
  m.style.display=open?'none':'flex';
  if(!open&&_aHistory.length===0){
    // sync lang with main app
    const lp=document.querySelector('.lp.on');
    if(lp) _aLang=lp.textContent.toLowerCase();
    const g=_aT('greeting');
    setTimeout(()=>{_aAddMsg('asya',g);_aSpeak(g);},200);
  }
}

let _map=null,_marker=null,_locTimer=null,_mapReady=false;
function _locDebounce(){clearTimeout(_locTimer);_locTimer=setTimeout(_locSearch,500);}
function _locSearch(){
  var val=document.getElementById('inp-loc').value.trim();
  var dd=document.getElementById('loc-dropdown');
  if(val.length<3){if(dd)dd.style.display='none';return;}
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(val+' Canada')+'&format=json&limit=5&addressdetails=1')
    .then(function(r){return r.json();})
    .then(function(results){
      if(!dd) return;
      if(!results||!results.length){dd.style.display='none';return;}
      dd.innerHTML='';
      results.forEach(function(r){
        var parts=r.display_name.split(',');
        var main=parts[0].trim();
        var sub=parts.slice(1,3).join(',').trim();
        var item=document.createElement('div');
        item.className='loc-item';
        item.innerHTML='<strong>'+main+'</strong><span>'+sub+'</span>';
        item.onclick=function(){
          document.getElementById('inp-loc').value=r.display_name;
          dd.style.display='none';
          _initMap(parseFloat(r.lat),parseFloat(r.lon));
          _showMapConfirm(r.display_name);
        };
        dd.appendChild(item);
      });
      dd.style.display='block';
    }).catch(function(){});
}
document.addEventListener('click',function(e){
  var dd=document.getElementById('loc-dropdown');
  if(dd&&!dd.contains(e.target)&&e.target.id!=='inp-loc') dd.style.display='none';

function _initMap(lat,lng){
  var el=document.getElementById('map-preview');if(!el)return;el.style.display='block';
  if(!_mapReady){var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=function(){_mapReady=true;_renderMap(lat,lng);};document.head.appendChild(s);}
  else{_renderMap(lat,lng);}
}
function _renderMap(lat,lng){
  var el=document.getElementById('map-preview');if(!el)return;
  if(_map){_map.remove();_map=null;}
  _map=L.map(el,{zoomControl:true,attributionControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_map);
  _marker=L.marker([lat,lng]).addTo(_map);
  setTimeout(function(){if(_map)_map.invalidateSize();},100);
}

function _mapClear(){var mp=document.getElementById('map-preview'),mc=document.getElementById('map-confirm'),il=document.getElementById('inp-loc');if(mp)mp.style.display='none';if(mc)mc.style.display='none';if(il)il.value='';if(_map){_map.remove();_map=null;}}
